<!DOCTYPE html>
<html>
<head>
    <title>Packing Checklist</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        li {
            margin: 8px 0;
        }
    </style>
</head>
<body>

<h2>🧳 Packing Checklist</h2>

<form method="POST">
    <input type="text" name="item" placeholder="Add new item" required>
    <button type="submit">Add</button>
</form>

<br>

<ul>
    {% for item in items %}
        <li>
            <input type="checkbox"> {{ item }}
        </li>
    {% endfor %}
</ul>

<a href="/">⬅ Back</a>

</body>
</html>
